name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Test
        run: make test

      - name: Build
        run: make build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-cpa-stats-plugin-${{ matrix.os }}
          path: bin/

  release:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build all platforms
        env:
          PLUGIN_ID: my-cpa-stats-plugin
          VERSION: ${{ github.ref_name }}
        run: |
          set -e
          # strip leading 'v' from version (e.g. v0.1.0 -> 0.1.0)
          VER="${VERSION#v}"
          mkdir -p dist
          for pair in "windows amd64 .dll" "linux amd64 .so" "darwin amd64 .dylib"; do
            GOOS=$(echo $pair | cut -d' ' -f1)
            GOARCH=$(echo $pair | cut -d' ' -f2)
            EXT=$(echo $pair | cut -d' ' -f3)
            OUT="dist/${PLUGIN_ID}.${EXT}"
            echo "Building $GOOS/$GOARCH -> $OUT"
            CGO_ENABLED=1 GOOS=$GOOS GOARCH=$GOARCH \
              go build -buildmode=c-shared -o "$OUT" ./plugin
            ZIP="dist/${PLUGIN_ID}_${VER}_${GOOS}_${GOARCH}.zip"
            (cd dist && zip -j "$ZIP" "${PLUGIN_ID}.${EXT}")
          done
          sha256sum dist/*.zip > dist/checksums.txt
          cat dist/checksums.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/checksums.txt
          generate_release_notes: true
