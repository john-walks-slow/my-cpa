name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Test
        run: make test

      - name: Build
        run: make build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-cpa-stats-plugin-${{ matrix.os }}
          path: bin/

  release:
    name: Build & Package (${{ matrix.label }})
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: so
            label: linux/amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: dll
            label: windows/amd64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: dylib
            label: darwin/amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build & zip
        env:
          PLUGIN_ID: my-cpa-stats-plugin
          VERSION: ${{ github.ref_name }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          EXT: ${{ matrix.ext }}
        run: |
          set -e
          VER="${VERSION#v}"
          mkdir -p dist
          OUT="dist/${PLUGIN_ID}.${EXT}"
          ZIP="dist/${PLUGIN_ID}_${VER}_${GOOS}_${GOARCH}.zip"
          echo "Building ${GOOS}/${GOARCH} -> ${OUT}"
          CGO_ENABLED=1 GOOS=$GOOS GOARCH=$GOARCH \
            go build -buildmode=c-shared -o "$OUT" ./plugin
          # Use Python's zipfile for portable, deterministic zipping across all 3 OSes.
          # `zip -j` on the linux/macOS runner is fine but Python keeps one tool path.
          python - <<PYEOF
          import os, zipfile
          src = os.path.join('dist', '${PLUGIN_ID}.${EXT}')
          dst = os.path.join('dist', '${PLUGIN_ID}_${VER}_${GOOS}_${GOARCH}.zip')
          arcname = '${PLUGIN_ID}.${EXT}'
          with zipfile.ZipFile(dst, 'w', zipfile.ZIP_DEFLATED) as z:
              z.write(src, arcname=arcname)
          print('wrote', dst)
          PYEOF
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.zip

  publish-release:
    name: Publish Release
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: artifacts
        run: |
          set -e
          sha256sum *.zip > checksums.txt
          cat checksums.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.zip
            artifacts/checksums.txt
          generate_release_notes: true
